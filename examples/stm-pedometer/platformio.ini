; Self-contained port of ST's LSM6DSOX pedometer example (lsm6dsox_pedometer.c)
; to the Arduino Nano RP2040 Connect. Build/flash from this directory:
;   pio run -t upload        ; build + flash
;   pio device monitor       ; watch "steps :N" while moving the board
;
; The STM standard-C driver (lsm6dsox_reg.c/.h) lives in src/ and is compiled
; together with src/main.cpp, which replaces the eval-board platform layer with
; a Wire (I2C) implementation. No external libraries are required.

[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino
monitor_speed = 115200
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0
