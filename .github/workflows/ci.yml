name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      # 1) Firmware must compile for the real board (catches I2C / Arduino API
      #    regressions even though we cannot flash in CI). Both communication
      #    modes are compile-checked: BLE RSC streaming (default) and the
      #    USB-Serial DEBUG ring-buffer dump (see platformio.ini COM_MODE).
      - name: Build firmware (Nano RP2040 Connect — BLE mode)
        run: pio run -e nanorp2040connect

      - name: Build firmware (Nano RP2040 Connect — DEBUG mode)
        run: pio run -e nanorp2040connect-debug

      # 2) Host unit + simulated end-to-end tests (no board required).
      - name: Run native unit tests
        run: pio test -e native

      # Hardware end-to-end (flash + per-feature serial check on the physical
      # board) is intentionally NOT here: GitHub's cloud runners have no device
      # attached. It is run locally on the dev PC the Nano is wired to, via
      # `./scripts/flash-verify.sh` (claim board -> build -> flash -> run the
      # tests/e2e/ per-feature harness). See CONTRIBUTING.md -> Testing strategy.
      # To move this into CI, register a GitHub self-hosted runner on that PC and
      # add a `runs-on: [self-hosted, linux]` job that calls flash-verify.sh.
