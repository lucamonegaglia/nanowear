name: Claude Auto-Resolve PR Conflicts

# When a PR is merged into `main`, every other open PR targeting `main` may
# suddenly conflict. This workflow re-checks those PRs in the background and,
# for any that now conflict, asks Claude Code (headless) to resolve the
# conflict markers and push the fix back to the PR branch — no new CLI session
# required on your side.
on:
  pull_request:
    types: [closed]

# We only need to read PRs and push to their branches.
permissions:
  contents: write
  pull-requests: write

# Avoid two merges racing to resolve the same set of PRs at once.
concurrency:
  group: resolve-conflicts
  cancel-in-progress: false

jobs:
  resolve-conflicts:
    # Only act when a PR was actually MERGED into the main branch.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Find and resolve conflicting open PRs
        env:
          # Required repository secret: a Claude API key (Settings -> Secrets).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          git config --global user.name "claude-code-bot[bot]"
          git config --global user.email "claude-code-bot@users.noreply.github.com"

          # Prompt given to Claude for each conflicting PR. Keep it explicit:
          # preserve BOTH sides' intent and stage every resolved file.
          RESOLVE_PROMPT='You are resolving git merge conflicts. A `git merge origin/main` left conflict markers (<<<<<<<, =======, >>>>>>>) in the working tree. For every file containing markers, resolve the conflict by preserving the logical intent of BOTH sides: keep all meaningful changes from each side, reconcile overlapping edits sensibly, and do not silently drop either branch'"'"'s work. After fixing a file, stage it with `git add`. When no files remain in an unmerged state, stop. Do NOT run interactive commands, do NOT commit, and do NOT push. If a conflict is genuinely ambiguous or unsafe to resolve, leave it marked and stop.'

          MERGED_PR="${{ github.event.pull_request.number }}"

          gh pr list --base main --state open --json number,headRefName \
            | jq -c '.[]' | while read -r pr; do
            PR_NUM="$(echo "$pr" | jq -r '.number')"
            PR_BRANCH="$(echo "$pr" | jq -r '.headRefName')"

            echo "::group::Inspecting PR #$PR_NUM ($PR_BRANCH)"

            # Refresh refs for both the PR branch and main.
            git fetch origin "refs/heads/$PR_BRANCH:refs/remotes/origin/$PR_BRANCH"
            git fetch origin "refs/heads/main:refs/remotes/origin/main"

            # Start from a clean copy of the PR branch.
            git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"

            # Attempt the merge. A clean outcome means no conflicts to fix.
            if git merge --no-commit --no-ff origin/main >/dev/null 2>&1; then
              echo "PR #$PR_NUM merges cleanly into main — nothing to do."
              git merge --abort || true
              echo "::endgroup::"
              continue
            fi

            echo "PR #$PR_BRANCH conflicts with main — asking Claude to resolve."
            claude -p "$RESOLVE_PROMPT" \
              --dangerously-skip-permissions \
              --max-turns 12

            # Any file still in an unmerged state => Claude could not finish.
            UNMERGED="$(git diff --name-only --diff-filter=U)"
            if [ -n "$UNMERGED" ]; then
              echo "::error::Claude could not fully resolve conflicts in: $UNMERGED"
              git merge --abort || true
              gh pr comment "$PR_NUM" \
                --body "⚠️ Automated conflict resolution failed after the merge of #$MERGED_PR (Claude could not safely resolve: $UNMERGED). Please resolve the conflicts manually." || true
            else
              git commit -m "chore: auto-resolve merge conflicts with main via Claude Code" \
                -m "Triggered by merge of #$MERGED_PR."
              if git push origin "$PR_BRANCH"; then
                gh pr comment "$PR_NUM" \
                  --body "✅ Merge conflicts with \`main\` were automatically resolved by Claude Code after the merge of #$MERGED_PR. Please re-review." || true
              else
                echo "::error::Push to $PR_BRANCH failed (likely a fork PR or branch protection)."
                git merge --abort || true
              fi
            fi

            echo "::endgroup::"
          done
