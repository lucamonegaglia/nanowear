[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = time, default

; Library Dependencies (board build only)
lib_deps =
    arduino-libraries/WiFiNINA @ ^1.8.14
    mikalhart/TinyGPSPlus @ ^1.0.3
    arduino-libraries/Arduino_LSM6DSOX @ ^1.1.2

; Build Optimization Flags
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0

; ---------------------------------------------------------------------------
; Native (host) test environment
; ---------------------------------------------------------------------------
; Runs the firmware's pure logic on the developer machine / CI using the
; Unity test framework and a MockIMU. No board, no I2C, no flashing required.
;
; Only src/pedometer.cpp is compiled (it pulls in imu.h / step_codec.h /
; state_machine.h); the board-only HardwareIMU and main.cpp are intentionally
; excluded so the build stays hardware-free. Suites live under test/test_*/.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<hardware_imu.cpp>
build_flags =
    -D UNIT_TEST
