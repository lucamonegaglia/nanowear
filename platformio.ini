[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = time, default

; Library Dependencies
lib_deps =
    arduino-libraries/WiFiNINA @ ^1.8.14
    mikalhart/TinyGPSPlus @ ^1.0.3
    arduino-libraries/Arduino_LSM6DSOX @ ^1.1.2

; Build Optimization Flags
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0

; ---------------------------------------------------------------------------
; Native (host) test environment
; ---------------------------------------------------------------------------
; Runs the firmware's pure logic on the developer machine / CI using the
; Unity test framework and a MockIMU. No board, I2C, or flashing required.
;
; Only the board-only HardwareIMU and main.cpp are excluded; pedometer.cpp
; (which pulls in imu.h / step_codec.h) plus elapsed_timer.h are compiled.
; See test/native/ for the suites.
[env:native]
platform = native
test_framework = unity
build_flags =
    -D UNIT_TEST
    -DUNITY_MAIN
