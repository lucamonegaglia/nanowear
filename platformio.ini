; ---------------------------------------------------------------------------
; Communication mode (compile-time switch — see AGENTS.md / ROADMAP.md S2)
; ---------------------------------------------------------------------------
; The firmware ships two mutually-exclusive communication modes, selected at
; build time by the COM_MODE macro. Pick the env to flash:
;   * nanorp2040connect       -> COM_MODE_BLE   : stream RSC to a phone over BLE
;   * nanorp2040connect-debug -> COM_MODE_DEBUG : dump the in-RAM ring buffer
;                                                  (StepLog) over USB Serial
; The two modes are mutually exclusive by compile-time gating in src/main.cpp:
;   * DEBUG build: the BLE driver (ble_peripheral_arduino.cpp) is excluded and
;     ArduinoBLE is dropped from lib_deps, so the BLE radio is genuinely not
;     linked in.
;   * BLE build: the USB-Serial debug dump is not *activated* (loop() never calls
;     DebugConsole in BLE mode). The dump source is still linked because the
;     opt-in running-dynamics dual-core path (NANOWEAR_RUNNING_DYNAMICS, a
;     BLE-only sub-feature) owns the ring buffer + dump on Core1 for on-device
;     extraction during development.
; Switch modes by building/flashing the other env (no reflash of the NINA
; firmware needed — only the sketch changes).

[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = time, default

; Library Dependencies (board build only)
;   WiFiNINA >=2.0.0 and ArduinoBLE >=2.0.0 are REQUIRED for the NINA-W102 BLE
;   path (simultaneous Wi-Fi + BLE over SPI; needs NINA firmware >= 3.0.1 — see
;   docs/BLE_SETUP.md). The RGB LED still goes through WiFiNINA as before.
lib_deps =
    arduino-libraries/WiFiNINA @ ^2.0.0
    arduino-libraries/ArduinoBLE @ ^2.0.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    arduino-libraries/Arduino_LSM6DSOX @ ^1.1.2

; Build Optimization Flags
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0
    -D COM_MODE_BLE

; DEBUG build: same board/libs, but COM_MODE_DEBUG compiles in only the
; USB-Serial ring-buffer dump (StepLog + DebugConsole); no BLE radio.
; ArduinoBLE is dropped from lib_deps and the BLE driver is excluded so the
; BLE stack is genuinely not linked in.
[env:nanorp2040connect-debug]
platform = raspberrypi
board = nanorp2040connect
framework = arduino
monitor_speed = 115200
monitor_filters = time, default
lib_deps =
    arduino-libraries/WiFiNINA @ ^2.0.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    arduino-libraries/Arduino_LSM6DSOX @ ^1.1.2
build_src_filter = +<*> -<ble_peripheral_arduino.cpp>
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0
    -D COM_MODE_DEBUG

; ---------------------------------------------------------------------------
; Native (host) test environment
; ---------------------------------------------------------------------------
; Runs the firmware's pure logic on the developer machine / CI using the
; Unity test framework and a MockIMU. No board, no I2C, no flashing required.
;
; Only src/pedometer.cpp is compiled (it pulls in imu.h / step_codec.h /
; state_machine.h); the board-only HardwareIMU, main.cpp, the ArduinoBLE
; driver (ble_peripheral_arduino.cpp) and debug_console.cpp are intentionally
; excluded so the build stays hardware-free. The BLE link logic is tested
; through MockBlePeripheral (in ble_peripheral.h) with no radio. Suites live
; under test/test_*/.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<hardware_imu.cpp> -<ble_peripheral_arduino.cpp> -<debug_console.cpp>
build_flags =
    -D UNIT_TEST
