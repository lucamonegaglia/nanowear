[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = time, default

; Library Dependencies (board build only)
;   WiFiNINA >=2.0.0 and ArduinoBLE >=2.0.0 are REQUIRED for the NINA-W102 BLE
;   path (simultaneous Wi-Fi + BLE over SPI; needs NINA firmware >= 3.0.1 — see
;   docs/BLE_SETUP.md). The RGB LED still goes through WiFiNINA as before.
lib_deps =
    arduino-libraries/WiFiNINA @ ^2.0.0
    arduino-libraries/ArduinoBLE @ ^2.0.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    arduino-libraries/Arduino_LSM6DSOX @ ^1.1.2

; Build Optimization Flags
build_flags =
    -O2
    -D CORE_DEBUG_LEVEL=0

; ---------------------------------------------------------------------------
; Native (host) test environment
; ---------------------------------------------------------------------------
; Runs the firmware's pure logic on the developer machine / CI using the
; Unity test framework and a MockIMU. No board, no I2C, no flashing required.
;
; Only src/pedometer.cpp is compiled (it pulls in imu.h / step_codec.h /
; state_machine.h); the board-only HardwareIMU, main.cpp, the ArduinoBLE
; driver (ble_peripheral_arduino.cpp) and debug_console.cpp are intentionally
; excluded so the build stays hardware-free. The BLE link logic is tested
; through MockBlePeripheral (in ble_peripheral.h) with no radio. Suites live
; under test/test_*/.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<hardware_imu.cpp> -<ble_peripheral_arduino.cpp> -<debug_console.cpp>
build_flags =
    -D UNIT_TEST
